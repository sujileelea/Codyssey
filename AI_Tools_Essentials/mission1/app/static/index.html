<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>공고 분석 챗봇</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #1f2430;
    --line: #2a3140;
    --text: #e6e9ef;
    --muted: #9aa4b2;
    --accent: #5b8cff;
    --accent-2: #3f6fe0;
    --ok: #43c59e;
    --warn: #f0a04b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
  }
  header {
    padding: 14px 20px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px; background: var(--panel);
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 650; }
  header .sub { color: var(--muted); font-size: 12px; }
  .topbar { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  select, input, button { font-family: inherit; font-size: 13px; }
  select {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px;
  }
  .layout { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 53px); }
  .left { border-right: 1px solid var(--line); overflow-y: auto; padding: 16px; background: var(--panel); }
  .url-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .url-row input {
    flex: 1; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px;
  }
  button.primary {
    background: var(--accent); color: white; border: none; border-radius: 8px;
    padding: 10px 14px; cursor: pointer; font-weight: 600; white-space: nowrap;
  }
  button.primary:hover { background: var(--accent-2); }
  button.primary:disabled { opacity: .5; cursor: not-allowed; }
  .poster { width: 100%; border-radius: 10px; border: 1px solid var(--line); margin-bottom: 14px; display: none; }
  .fields { display: flex; flex-direction: column; gap: 8px; }
  .field {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px;
  }
  .field .k { font-size: 11px; color: var(--muted); margin-bottom: 3px; letter-spacing: .02em; }
  .field .v { font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
  .field.empty .v { color: var(--warn); }
  .hint { color: var(--muted); font-size: 12px; line-height: 1.6; }

  .right { display: flex; flex-direction: column; height: 100%; }
  .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 78%; padding: 11px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--accent-2); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--panel-2); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; color: var(--muted); font-size: 12px; background: transparent; }
  .composer { border-top: 1px solid var(--line); padding: 14px 20px; display: flex; gap: 10px; background: var(--panel); }
  .composer input {
    flex: 1; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; font-size: 14px;
  }
  .composer input:disabled { opacity: .5; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .chip {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--muted);
    border-radius: 999px; padding: 6px 11px; font-size: 12px; cursor: pointer;
  }
  .chip:hover { color: var(--text); border-color: var(--accent); }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--muted); border-top-color:transparent; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle;}
  @keyframes spin { to { transform: rotate(360deg);} }
</style>
</head>
<body>
<header>
  <h1>📋 공고 분석 챗봇</h1>
  <span class="sub">공고 링크 → 포스터·문안 분석 → 문답</span>
  <div class="topbar">
    <label class="sub">모델</label>
    <select id="modelSelect"></select>
  </div>
</header>

<div class="layout">
  <div class="left">
    <div class="url-row">
      <input id="urlInput" type="url" placeholder="공고 URL을 붙여넣으세요 (https://...)" />
      <button class="primary" id="analyzeBtn">분석</button>
    </div>
    <img id="poster" class="poster" alt="공고 포스터" />
    <div id="fields" class="fields"></div>
    <div id="leftHint" class="hint">
      공고 URL을 입력하고 <b>분석</b>을 누르면, 포스터와 핵심 정보(제목·장소·날짜·참여조건·상금·주관기관 등)를 추출합니다.
      이후 오른쪽 챗봇에서 자유롭게 질문하세요.
    </div>
  </div>

  <div class="right">
    <div class="chat" id="chat">
      <div class="msg system">분석된 공고가 아직 없습니다. 왼쪽에서 먼저 공고를 분석해 주세요.</div>
    </div>
    <div style="padding:0 20px;">
      <div class="chips" id="chips" style="display:none;">
        <span class="chip">제목이 뭐야?</span>
        <span class="chip">언제, 어디서 열려?</span>
        <span class="chip">참여 조건이 어떻게 돼?</span>
        <span class="chip">상금은 얼마야?</span>
        <span class="chip">주관기관은 어디야?</span>
        <span class="chip">접수 마감일은?</span>
      </div>
    </div>
    <div class="composer">
      <input id="chatInput" type="text" placeholder="공고에 대해 질문하세요…" disabled />
      <button class="primary" id="sendBtn" disabled>전송</button>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let CONTEXT = null;
let HISTORY = [];   // {role, content}

async function loadModels() {
  try {
    const r = await fetch('/api/models');
    const d = await r.json();
    $('modelSelect').innerHTML = d.models
      .map(m => `<option value="${m.key}" ${m.key===d.default?'selected':''}>${m.label}</option>`)
      .join('');
  } catch (e) {
    $('modelSelect').innerHTML = '<option>모델 정보를 불러오지 못함</option>';
  }
}

function renderFields(fields) {
  const box = $('fields');
  box.innerHTML = '';
  if (!fields || fields._parse_error) {
    box.innerHTML = `<div class="field empty"><div class="k">파싱 오류</div><div class="v">모델이 JSON을 반환하지 못했습니다. 원문:\n${(fields&&fields._raw)||''}</div></div>`;
    return;
  }
  Object.entries(fields).forEach(([k, v]) => {
    if (k.startsWith('_')) return;
    const empty = (v === '정보 없음' || v === '' || v == null);
    const el = document.createElement('div');
    el.className = 'field' + (empty ? ' empty' : '');
    el.innerHTML = `<div class="k">${k}</div><div class="v">${(v==null?'':v)}</div>`;
    box.appendChild(el);
  });
}

function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  $('chat').appendChild(el);
  $('chat').scrollTop = $('chat').scrollHeight;
  return el;
}

async function analyze() {
  const url = $('urlInput').value.trim();
  if (!url) return;
  $('analyzeBtn').disabled = true;
  $('analyzeBtn').innerHTML = '<span class="spinner"></span>';
  $('leftHint').style.display = 'none';
  try {
    const r = await fetch('/api/analyze', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ url, model_key: $('modelSelect').value })
    });
    const d = await r.json();
    if (!d.ok) { alert('분석 실패: ' + d.error); return; }
    // 포스터
    const img = $('poster');
    if (d.poster_data_uri || d.poster_url) {
      img.src = d.poster_data_uri || d.poster_url;
      img.style.display = 'block';
    } else { img.style.display = 'none'; }
    renderFields(d.fields);
    CONTEXT = d.context;
    HISTORY = [];
    $('chat').innerHTML = '';
    addMsg('system', '공고 분석이 완료되었습니다. 무엇이든 물어보세요.');
    $('chatInput').disabled = false; $('sendBtn').disabled = false;
    $('chips').style.display = 'flex';
  } catch (e) {
    alert('오류: ' + e.message);
  } finally {
    $('analyzeBtn').disabled = false;
    $('analyzeBtn').textContent = '분석';
  }
}

async function send() {
  const text = $('chatInput').value.trim();
  if (!text || !CONTEXT) return;
  $('chatInput').value = '';
  addMsg('user', text);
  HISTORY.push({ role: 'user', content: text });
  $('sendBtn').disabled = true;
  const thinking = addMsg('bot', '…');
  try {
    const r = await fetch('/api/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ messages: HISTORY, context: CONTEXT, model_key: $('modelSelect').value })
    });
    const d = await r.json();
    const answer = d.ok ? d.answer : ('오류: ' + d.error);
    thinking.textContent = answer;
    if (d.ok) HISTORY.push({ role: 'assistant', content: answer });
  } catch (e) {
    thinking.textContent = '오류: ' + e.message;
  } finally {
    $('sendBtn').disabled = false;
    $('chatInput').focus();
  }
}

$('analyzeBtn').addEventListener('click', analyze);
$('urlInput').addEventListener('keydown', e => { if (e.key==='Enter') analyze(); });
$('sendBtn').addEventListener('click', send);
$('chatInput').addEventListener('keydown', e => { if (e.key==='Enter') send(); });
$('chips').addEventListener('click', e => {
  if (e.target.classList.contains('chip')) { $('chatInput').value = e.target.textContent; send(); }
});
loadModels();
</script>
</body>
</html>
